apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-chat-api
  labels:
    app: chat-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-api
  template:
    metadata:
      labels:
        app: chat-api
    spec:
      containers:
      - name: chat-api
        image: rayhimself/basic-redis-chat-app-api:latest
        ports:
        - containerPort: 5000 # Проверьте порт в документации образа
        env:
        - name: REDIS_URL
          value: "redis://redis-service:6379" # Укажите адрес вашего Redis
